<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" width="880" height="270" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="ROS TF 프레임 체인: map에서 odom은 AMCL이, odom에서 base_footprint는 휠 오도메트리 또는 EKF가 담당하며, 둘이 합쳐져 지도상 로봇 위치 map에서 base_footprint가 만들어진다">
  <rect x="1" y="1" width="878" height="268" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="878" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <!-- title bar -->
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="858" y="28" text-anchor="end" font-size="12" fill="#5d6b78">TF tree — map → odom → base_footprint</text>

  <!-- frame nodes -->
  <rect x="40" y="92" width="150" height="50" rx="9" fill="rgba(108,182,255,0.10)" stroke="#6cb6ff" stroke-width="1.5"/>
  <text x="115" y="123" text-anchor="middle" font-size="17" font-weight="700" fill="#b9dcff">map</text>

  <rect x="365" y="92" width="150" height="50" rx="9" fill="rgba(94,242,184,0.10)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="440" y="123" text-anchor="middle" font-size="17" font-weight="700" fill="#b6f2d8">odom</text>

  <rect x="690" y="92" width="150" height="50" rx="9" fill="rgba(185,167,230,0.10)" stroke="#b9a7e6" stroke-width="1.5"/>
  <text x="765" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#d6c9f2">base_footprint</text>

  <!-- arrows -->
  <g stroke="#3a4654" stroke-width="1.8" fill="none">
    <path d="M190 117 H 358" marker-end="url(#ah)"/>
    <path d="M515 117 H 683" marker-end="url(#ah)"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3a4654"/>
    </marker>
  </defs>

  <!-- responsibility labels under each segment -->
  <text x="274" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#5ef2b8">AMCL</text>
  <text x="274" y="168" text-anchor="middle" font-size="12" fill="#8c98a4">지도 기준 누적 drift 보정</text>

  <text x="599" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#b9a7e6">wheel odometry / EKF</text>
  <text x="599" y="168" text-anchor="middle" font-size="12" fill="#8c98a4">짧은 시간 움직임 추정</text>

  <!-- result line -->
  <g stroke="#3a4654" stroke-width="1.4" stroke-dasharray="4 4" fill="none">
    <path d="M115 142 V 210 H 765 V 142"/>
  </g>
  <rect x="300" y="196" width="280" height="32" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.2"/>
  <text x="440" y="217" text-anchor="middle" font-size="13" font-weight="600" fill="#f3c79b">map → base_footprint = 지도 위 로봇 위치</text>
</svg>
