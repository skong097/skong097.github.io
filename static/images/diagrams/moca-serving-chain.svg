<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 582" width="560" height="582" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="서빙 모드 전체 체인: 브라우저 버튼 클릭이 WebSocket으로 OperationServer에, ROS2 서비스 SetMode로 mode_manager에, 서브프로세스 launch로 serving_dispatcher에, ROS2 액션으로 Nav2에, ROS2 토픽으로 cmd_vel 파이프라인에 전달되고, 최종적으로 Modbus RTU로 모터와 바퀴를 구동한다 — 여섯 개의 프로토콜 경계를 통과한다">
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L6 3 L0 6 z" fill="#3a4654"/></marker></defs>
  <rect x="1" y="1" width="558" height="580" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="558" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="538" y="28" text-anchor="end" font-size="12" fill="#5d6b78">flow — 서빙 전체 체인</text>

  <!-- 1 -->
  <rect x="130" y="64" width="300" height="40" rx="8" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.3"/>
  <text x="280" y="89" text-anchor="middle" font-size="12.5" fill="#b9dcff">버튼 클릭 (브라우저)</text>
  <path d="M280 104 V 138" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="125" font-size="11" fill="#6272a4">WebSocket</text>

  <!-- 2 -->
  <rect x="130" y="140" width="300" height="40" rx="8" fill="rgba(94,242,184,0.08)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="280" y="165" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b6f2d8">OperationServer (검증·게이팅)</text>
  <path d="M280 180 V 214" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="201" font-size="11" fill="#6272a4">ROS2 서비스 (SetMode)</text>

  <!-- 3 -->
  <rect x="130" y="216" width="300" height="40" rx="8" fill="rgba(94,242,184,0.06)" stroke="#5ef2b8" stroke-width="1.3"/>
  <text x="280" y="241" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b6f2d8">mode_manager</text>
  <path d="M280 256 V 290" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="277" font-size="11" fill="#6272a4">subprocess (launch)</text>

  <!-- 4 -->
  <rect x="130" y="292" width="300" height="40" rx="8" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.3"/>
  <text x="280" y="317" text-anchor="middle" font-size="12.5" fill="#d9cdf2">serving_dispatcher</text>
  <path d="M280 332 V 366" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="353" font-size="11" fill="#6272a4">ROS2 액션 (NavigateToPose)</text>

  <!-- 5 -->
  <rect x="130" y="368" width="300" height="40" rx="8" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.3"/>
  <text x="280" y="393" text-anchor="middle" font-size="12.5" fill="#d9cdf2">Nav2 (경로계획 · 추종)</text>
  <path d="M280 408 V 442" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="429" font-size="11" fill="#6272a4">ROS2 토픽 (cmd_vel)</text>

  <!-- 6 -->
  <rect x="130" y="444" width="300" height="40" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="280" y="469" text-anchor="middle" font-size="12" fill="#f3c79b">cmd_vel 파이프라인 (mux→smoother→monitor)</text>
  <path d="M280 484 V 518" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="294" y="505" font-size="11" fill="#6272a4">Modbus RTU</text>

  <!-- 7 -->
  <rect x="130" y="520" width="300" height="40" rx="8" fill="rgba(240,163,107,0.06)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="280" y="545" text-anchor="middle" font-size="12.5" fill="#f3c79b">모터 드라이버 → 바퀴 회전</text>
</svg>
