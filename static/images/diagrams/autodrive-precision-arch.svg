<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" width="880" height="430" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="Pinky 정밀 주차 전체 구조: 콘솔이 /wasab/precise_goal로 정밀 목표를 보내면 wasab_robot_agent가 robot_id가 일치하는 로봇으로만 재발행하고, 로봇의 precision node가 NavigateToPose로 Nav2 접근 주행을 하고 AprilTag 검출·TF로 태그 상대 pose를 계산해 /cmd_vel로 저속 PID/servo 정렬을 수행한다">
  <rect x="1" y="1" width="878" height="428" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="878" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="858" y="28" text-anchor="end" font-size="12" fill="#5d6b78">pipeline — 정밀 주차 구조</text>

  <defs>
    <marker id="af" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3a4654"/>
    </marker>
  </defs>

  <!-- 콘솔 -->
  <rect x="340" y="70" width="200" height="40" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <text x="440" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#b9dcff">콘솔</text>

  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M440 110 V 148" marker-end="url(#af)"/></g>
  <text x="452" y="133" font-size="12" fill="#8c98a4">/wasab/precise_goal</text>

  <!-- wasab_robot_agent -->
  <rect x="310" y="150" width="260" height="44" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <text x="440" y="177" text-anchor="middle" font-size="14" font-weight="600" fill="#b9dcff">wasab_robot_agent</text>

  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M440 194 V 232" marker-end="url(#af)"/></g>
  <text x="452" y="217" font-size="12" fill="#8c98a4">robot_id 일치 시 자기 도메인으로만 재발행</text>

  <!-- precision node -->
  <rect x="300" y="234" width="280" height="48" rx="9" fill="rgba(94,242,184,0.12)" stroke="#5ef2b8" stroke-width="1.6"/>
  <text x="440" y="263" text-anchor="middle" font-size="16" font-weight="700" fill="#b6f2d8">precision node</text>

  <!-- split to three outputs -->
  <g stroke="#3a4654" stroke-width="1.6" fill="none">
    <path d="M440 282 V 300"/>
    <path d="M440 300 H 155 V 322" marker-end="url(#af)"/>
    <path d="M440 300 V 322" marker-end="url(#af)"/>
    <path d="M440 300 H 725 V 322" marker-end="url(#af)"/>
  </g>

  <!-- output: Nav2 -->
  <rect x="35" y="324" width="240" height="60" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <text x="155" y="348" text-anchor="middle" font-size="12" fill="#8c98a4">NavigateToPose</text>
  <text x="155" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#b9dcff">Nav2 접근 주행</text>

  <!-- output: AprilTag -->
  <rect x="320" y="324" width="240" height="60" rx="8" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.2"/>
  <text x="440" y="348" text-anchor="middle" font-size="12" fill="#8c98a4">AprilTag 검출 / TF</text>
  <text x="440" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#d6c9f2">tag 상대 pose 계산</text>

  <!-- output: cmd_vel -->
  <rect x="605" y="324" width="240" height="60" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="725" y="348" text-anchor="middle" font-size="12" fill="#8c98a4">/cmd_vel</text>
  <text x="725" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#f3c79b">저속 PID/servo 정렬</text>

  <text x="440" y="410" text-anchor="middle" font-size="12" fill="#6272a4">Nav2가 근처까지 데려다주고, AprilTag가 마지막 몇 cm를 맞춘다</text>
</svg>
