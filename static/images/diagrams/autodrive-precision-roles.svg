<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="Nav2와 AprilTag PID의 역할 분리: Nav2는 지도 기준으로 목표물 근처까지 안전하게 이동하고, AprilTag PID는 목표물 기준 상대 pose로 마지막 cm 단위 정렬을 담당한다. 결국 Nav2로 가까이 가고 AprilTag로 정확히 멈추는 구조다">
  <rect x="1" y="1" width="878" height="298" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="878" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="858" y="28" text-anchor="end" font-size="12" fill="#5d6b78">summary — 역할 분리</text>

  <!-- Nav2 card -->
  <rect x="40" y="70" width="370" height="140" rx="10" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.3"/>
  <text x="225" y="104" text-anchor="middle" font-size="17" font-weight="700" fill="#b9dcff">Nav2</text>
  <text x="225" y="134" text-anchor="middle" font-size="13" fill="#c7def7">지도(map) 기준으로</text>
  <text x="225" y="156" text-anchor="middle" font-size="13" fill="#c7def7">목표물 근처까지 안전하게 이동</text>
  <text x="225" y="188" text-anchor="middle" font-size="12" fill="#8c98a4">넓은 공간 이동 · 경로계획 · 장애물 회피</text>

  <!-- arrow between -->
  <defs>
    <marker id="af3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3a4654"/>
    </marker>
  </defs>
  <g stroke="#3a4654" stroke-width="1.8" fill="none"><path d="M415 140 H 465" marker-end="url(#af3)"/></g>
  <text x="440" y="128" text-anchor="middle" font-size="11" fill="#6272a4">마지막 몇 cm</text>

  <!-- AprilTag PID card -->
  <rect x="470" y="70" width="370" height="140" rx="10" fill="rgba(94,242,184,0.12)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="655" y="104" text-anchor="middle" font-size="17" font-weight="700" fill="#b6f2d8">AprilTag PID</text>
  <text x="655" y="134" text-anchor="middle" font-size="13" fill="#cdefe0">목표물 기준 상대 pose로</text>
  <text x="655" y="156" text-anchor="middle" font-size="13" fill="#cdefe0">마지막 cm 단위 정렬</text>
  <text x="655" y="188" text-anchor="middle" font-size="12" fill="#8c98a4">정밀 정차 · 정면 정렬 · 저속 servo</text>

  <text x="440" y="256" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Nav2로 가까이 가고, AprilTag로 정확히 멈춘다</text>
  <text x="440" y="278" text-anchor="middle" font-size="11" fill="#6272a4">두 문제를 하나의 controller에 억지로 넣지 않고, 각자 잘하는 구간을 나눈다</text>
</svg>
