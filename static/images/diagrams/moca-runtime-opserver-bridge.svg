<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 448" width="680" height="448" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="OperationServer는 단일 프로세스 안에서 FastAPI/uvicorn(메인 asyncio 루프)와 rclpy 노드(별도 스레드 spin)를 함께 돌린다. 브라우저는 WebSocket/REST로 FastAPI와 통신하고, rclpy 노드는 call_async(SetMode)로 mode_manager에 명령하며 /mode/state 토픽으로 상태를 받는다. mode_manager는 launch로 디스패처·Nav2·cmd_vel·바퀴 체인을 실행한다">
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L6 3 L0 6 z" fill="#3a4654"/></marker></defs>
  <rect x="1" y="1" width="678" height="446" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="678" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="658" y="28" text-anchor="end" font-size="12" fill="#5d6b78">flow — OpServer ↔ rclpy 통합</text>

  <!-- browser -->
  <rect x="24" y="150" width="130" height="56" rx="8" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.3"/>
  <text x="89" y="183" text-anchor="middle" font-size="12.5" fill="#b9dcff">브라우저</text>

  <!-- OpServer process -->
  <rect x="186" y="72" width="300" height="238" rx="12" fill="rgba(94,242,184,0.05)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="336" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#b6f2d8">OperationServer (단일 프로세스)</text>
  <rect x="206" y="118" width="260" height="56" rx="9" fill="rgba(94,242,184,0.08)" stroke="#5ef2b8" stroke-width="1.2"/>
  <text x="336" y="142" text-anchor="middle" font-size="12.5" fill="#b6f2d8">FastAPI / uvicorn</text>
  <text x="336" y="159" text-anchor="middle" font-size="10.5" fill="#8c98a4">메인 asyncio 루프</text>
  <rect x="206" y="200" width="260" height="56" rx="9" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.2"/>
  <text x="336" y="224" text-anchor="middle" font-size="12.5" fill="#d9cdf2">rclpy 노드</text>
  <text x="336" y="241" text-anchor="middle" font-size="10.5" fill="#8c98a4">executor 별도 스레드 spin</text>

  <!-- browser <-> FastAPI -->
  <path d="M154 174 L206 150" stroke="#3a4654" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="166" y="150" font-size="10.5" fill="#6272a4">WS / REST</text>
  <path d="M206 166 L154 192" stroke="#3a4654" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="170" y="208" font-size="10.5" fill="#6272a4">push</text>

  <!-- rclpy <-> mode_manager -->
  <path d="M300 256 V 360" stroke="#3a4654" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="92" y="312" font-size="10.5" fill="#6272a4">call_async(SetMode)</text>
  <path d="M372 360 V 256" stroke="#3a4654" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="392" y="312" font-size="10.5" fill="#6272a4">/mode/state (구독)</text>

  <!-- mode_manager -->
  <rect x="246" y="362" width="180" height="54" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="336" y="394" text-anchor="middle" font-size="12.5" fill="#f3c79b">mode_manager</text>

  <!-- chain -->
  <path d="M426 389 H 470" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="430" y="381" font-size="10.5" fill="#6272a4">launch</text>
  <rect x="472" y="362" width="184" height="54" rx="8" fill="rgba(94,242,184,0.06)" stroke="#5ef2b8" stroke-width="1.2"/>
  <text x="564" y="389" text-anchor="middle" font-size="10.5" fill="#b6f2d8">디스패처 → Nav2 → cmd_vel → 바퀴</text>
</svg>
