<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" width="820" height="450" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="AMCL likelihood_field 점수 곡선. 빔 끝점이 벽에서 벗어난 거리 d가 커질수록 점수 exp(마이너스 d제곱 나누기 2 시그마제곱)가 줄어든다. sigma_hit=0.2는 완만해서 19cm 오차에도 점수 0.64로 관대하고, sigma_hit=0.05는 가팔라서 같은 19cm에서 점수 0.0007로 사실상 탈락시킨다. 1×2m 아레나에서는 0.05가 옳다.">
  <rect x="1" y="1" width="818" height="448" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="818" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="798" y="28" text-anchor="end" font-size="12" fill="#5d6b78">score — likelihood_field</text>

  <text x="100" y="74" font-size="13" fill="#8c98a4">점수 &#8733; exp( &#8722;d&#178; / 2&#183;sigma_hit&#178; )　　d = 빔 끝점이 최근접 벽에서 벗어난 거리</text>

  <!-- axes -->
  <g stroke="#3a4654" stroke-width="1.4" fill="none">
    <path d="M100 90 V 360"/>
    <path d="M100 360 H 730"/>
  </g>
  <!-- y gridlines -->
  <g stroke="#232c38" stroke-width="1" fill="none">
    <path d="M100 90 H 730"/>
    <path d="M100 225 H 730"/>
  </g>
  <text x="92" y="95" text-anchor="end" font-size="11" fill="#6272a4">1.0</text>
  <text x="92" y="229" text-anchor="end" font-size="11" fill="#6272a4">0.5</text>
  <text x="92" y="364" text-anchor="end" font-size="11" fill="#6272a4">0</text>
  <text x="66" y="228" text-anchor="middle" font-size="11" fill="#8c98a4" transform="rotate(-90 66 228)">점수(가중치)</text>

  <!-- x ticks -->
  <g stroke="#3a4654" stroke-width="1.2" fill="none">
    <path d="M300 360 V 366"/><path d="M500 360 V 366"/><path d="M700 360 V 366"/>
  </g>
  <text x="100" y="382" text-anchor="middle" font-size="11" fill="#6272a4">0</text>
  <text x="300" y="382" text-anchor="middle" font-size="11" fill="#6272a4">10cm</text>
  <text x="500" y="382" text-anchor="middle" font-size="11" fill="#6272a4">20cm</text>
  <text x="700" y="382" text-anchor="middle" font-size="11" fill="#6272a4">30cm</text>
  <text x="415" y="404" text-anchor="middle" font-size="11" fill="#8c98a4">d — 벽에서 벗어난 거리</text>

  <!-- sigma=0.2 curve (gentle) -->
  <path d="M100 90 L200 98 L300 122 L400 156 L480 188 L500 196 L600 236 L700 272"
        fill="none" stroke="#f0a36b" stroke-width="2.4"/>
  <!-- sigma=0.05 curve (steep) -->
  <path d="M100 90 L140 111 L200 196 L250 268 L300 324 L350 350 L400 357 L480 360 L700 360"
        fill="none" stroke="#5ef2b8" stroke-width="2.4"/>

  <!-- d = 19cm marker -->
  <g stroke="#8c98a4" stroke-width="1.2" fill="none" stroke-dasharray="4 4">
    <path d="M480 90 V 360"/>
  </g>
  <text x="480" y="86" text-anchor="middle" font-size="11" fill="#c9d3dd">관측된 밀림 d = 19cm</text>

  <circle cx="480" cy="188" r="5" fill="#f0a36b"/>
  <text x="492" y="180" font-size="12" fill="#f3c79b">0.64 — 만점의 64%, 거의 안 깎임</text>

  <circle cx="480" cy="359" r="5" fill="#5ef2b8"/>
  <text x="492" y="349" font-size="12" fill="#b6f2d8">0.0007 — 사실상 0점, 즉시 도태</text>

  <!-- legend -->
  <g>
    <rect x="560" y="110" width="18" height="4" rx="2" fill="#f0a36b"/>
    <text x="585" y="118" font-size="12" fill="#f3c79b">sigma_hit = 0.2  (Nav2 기본, 수십 m 실내용)</text>
    <rect x="560" y="132" width="18" height="4" rx="2" fill="#5ef2b8"/>
    <text x="585" y="140" font-size="12" fill="#b6f2d8">sigma_hit = 0.05 (1×2m 아레나 확정값)</text>
  </g>
</svg>
