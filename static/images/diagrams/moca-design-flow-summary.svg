<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 432" width="560" height="432" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="MOCA 설계 흐름 요약: 점주 브라우저가 WebSocket/REST로 OperationServer에 요청하면, OperationServer가 정책과 프로토콜 번역을 거쳐 ROS2 서비스/토픽으로 mode_manager FSM 코어에 전달하고, mode_manager가 모드 프로세스를 생성해 디스패처와 Nav2, cmd_vel 파이프라인을 통해 바퀴를 움직인다">
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L6 3 L0 6 z" fill="#3a4654"/></marker></defs>
  <rect x="1" y="1" width="558" height="430" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="558" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="538" y="28" text-anchor="end" font-size="12" fill="#5d6b78">flow — 설계 흐름 요약</text>

  <rect x="150" y="66" width="260" height="42" rx="8" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.3"/>
  <text x="280" y="92" text-anchor="middle" font-size="13" fill="#b9dcff">점주 브라우저</text>

  <path d="M280 108 V 150" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="292" y="133" font-size="11.5" fill="#6272a4">WebSocket / REST</text>

  <rect x="110" y="152" width="340" height="56" rx="10" fill="rgba(94,242,184,0.08)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="280" y="178" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b6f2d8">OperationServer</text>
  <text x="280" y="196" text-anchor="middle" font-size="11" fill="#8c98a4">정책(우선순위·완료판정) · 프로토콜 번역</text>

  <path d="M280 208 V 250" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="292" y="233" font-size="11.5" fill="#6272a4">ROS2 서비스 / 토픽</text>

  <rect x="110" y="252" width="340" height="56" rx="10" fill="rgba(94,242,184,0.06)" stroke="#5ef2b8" stroke-width="1.3"/>
  <text x="280" y="278" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b6f2d8">mode_manager (FSM 코어)</text>
  <text x="280" y="296" text-anchor="middle" font-size="11" fill="#8c98a4">모드 프로세스 생성·종료 · 안전 가드</text>

  <path d="M280 308 V 350" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <rect x="90" y="352" width="380" height="44" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="280" y="379" text-anchor="middle" font-size="12" fill="#f3c79b">디스패처 → Nav2 → cmd_vel 파이프라인 → 바퀴</text>
