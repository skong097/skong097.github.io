<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 384" width="720" height="384" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="voice_iot_controller 아키텍처: 입력 파이프라인(마이크→Whisper STT→Ollama LLM→JSON)이 FastAPI 코어 서버로 전달되고, 코어 서버는 WebSocket으로 웹 대시보드, TCP로 ESP32 5대에 연결된다">
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L6 3 L0 6 z" fill="#3a4654"/></marker></defs>
  <rect x="1" y="1" width="718" height="382" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="718" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="698" y="28" text-anchor="end" font-size="12" fill="#5d6b78">architecture — voice_iot_controller</text>

  <!-- INPUT PIPELINE -->
  <rect x="130" y="62" width="460" height="58" rx="9" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.4"/>
  <text x="360" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#b9dcff">INPUT PIPELINE</text>
  <text x="360" y="105" text-anchor="middle" font-size="12.5" fill="#8c98a4">마이크 → Whisper STT → Ollama LLM → JSON 명령</text>

  <path d="M360 120 V 146" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- CORE SERVER -->
  <rect x="96" y="148" width="528" height="96" rx="9" fill="rgba(94,242,184,0.08)" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="360" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#b6f2d8">CORE SERVER (FastAPI · Python)</text>
  <text x="360" y="192" text-anchor="middle" font-size="12.5" fill="#c9d1d9">REST :8000 │ WebSocket /ws │ TCP Server :9000</text>
  <text x="360" y="212" text-anchor="middle" font-size="12.5" fill="#8c98a4">stt_engine · llm_engine · command_router</text>
  <text x="360" y="230" text-anchor="middle" font-size="12.5" fill="#8c98a4">tcp_server · websocket_hub · tts_engine</text>

  <path d="M220 244 V 286" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="228" y="268" font-size="11.5" fill="#6272a4">WebSocket</text>
  <path d="M500 244 V 286" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="508" y="268" font-size="11.5" fill="#6272a4">TCP Socket</text>

  <!-- leaves -->
  <rect x="80" y="288" width="260" height="60" rx="9" fill="rgba(240,163,107,0.08)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="210" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f3c79b">Web Dashboard</text>
  <text x="210" y="332" text-anchor="middle" font-size="12" fill="#8c98a4">브라우저 실시간</text>

  <rect x="380" y="288" width="260" height="60" rx="9" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.3"/>
  <text x="510" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#d8c9f0">ESP32 × 5대 (5개 방)</text>
  <text x="510" y="332" text-anchor="middle" font-size="12" fill="#8c98a4">LED · 서보 · 센서 · 7세그먼트</text>
</svg>
