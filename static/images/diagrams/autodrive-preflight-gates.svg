<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="맵 빌드 전 로봇 검증 게이트 G0부터 G5까지. G0 네트워크·DDS, G1 라이다, G2 휠 odom, G3 파일·파라미터, G4 측위, G5 회전 품질 순서로 진행하며, 뒤 게이트는 앞 게이트가 통과해야 의미가 있다. 라이다가 휘어 있으면 맵·AMCL·태그 좌표가 전부 오염되므로 G1 라이다 검증을 가장 먼저 둔다.">
  <rect x="1" y="1" width="818" height="518" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="818" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="798" y="28" text-anchor="end" font-size="12" fill="#5d6b78">gate — preflight_robot</text>

  <defs>
    <marker id="pg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3a4654"/>
    </marker>
  </defs>

  <text x="60" y="72" font-size="12" fill="#8c98a4">순서를 지킬 것 — 뒤 게이트는 앞이 통과해야 의미가 있다</text>

  <!-- G0 -->
  <rect x="60" y="84" width="500" height="52" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <rect x="72" y="98" width="52" height="24" rx="5" fill="rgba(108,182,255,0.16)"/>
  <text x="98" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#b9dcff">G0</text>
  <text x="140" y="106" font-size="14" font-weight="600" fill="#b9dcff">네트워크 · DDS</text>
  <text x="140" y="125" font-size="11" fill="#8c98a4">ap0 주소 잔존 / 도메인 충돌 (/scan publisher = 1)</text>
  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M310 136 V 156" marker-end="url(#pg)"/></g>

  <!-- G1 (hero) -->
  <rect x="60" y="158" width="500" height="52" rx="8" fill="rgba(94,242,184,0.12)" stroke="#5ef2b8" stroke-width="1.7"/>
  <rect x="72" y="172" width="52" height="24" rx="5" fill="rgba(94,242,184,0.2)"/>
  <text x="98" y="189" text-anchor="middle" font-size="13" font-weight="700" fill="#b6f2d8">G1</text>
  <text x="140" y="180" font-size="14" font-weight="700" fill="#b6f2d8">라이다 — ★ 자를 먼저 잰다</text>
  <text x="140" y="199" font-size="11" fill="#8c98a4">마주보는 두 빔의 합 = 통로 폭 (pose 불변량). +8.5cm면 이 로봇 금지</text>
  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M310 210 V 230" marker-end="url(#pg)"/></g>

  <!-- G2 -->
  <rect x="60" y="232" width="500" height="52" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <rect x="72" y="246" width="52" height="24" rx="5" fill="rgba(108,182,255,0.16)"/>
  <text x="98" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="#b9dcff">G2</text>
  <text x="140" y="254" font-size="14" font-weight="600" fill="#b9dcff">휠 odom</text>
  <text x="140" y="273" font-size="11" fill="#8c98a4">직진 1m → r,  제자리 360° → B  (둘 다 실측. 남의 값 복사 금지)</text>
  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M310 284 V 304" marker-end="url(#pg)"/></g>

  <!-- G3 -->
  <rect x="60" y="306" width="500" height="52" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <rect x="72" y="320" width="52" height="24" rx="5" fill="rgba(108,182,255,0.16)"/>
  <text x="98" y="337" text-anchor="middle" font-size="13" font-weight="700" fill="#b9dcff">G3</text>
  <text x="140" y="328" font-size="14" font-weight="600" fill="#b9dcff">파일 · 파라미터</text>
  <text x="140" y="347" font-size="11" fill="#8c98a4">맵 wasab_map11 / AMCL alpha·recovery·sigma_hit / 휠값 6곳 일치</text>
  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M310 358 V 378" marker-end="url(#pg)"/></g>

  <!-- G4 -->
  <rect x="60" y="380" width="500" height="52" rx="8" fill="rgba(108,182,255,0.08)" stroke="#6cb6ff" stroke-width="1.2"/>
  <rect x="72" y="394" width="52" height="24" rx="5" fill="rgba(108,182,255,0.16)"/>
  <text x="98" y="411" text-anchor="middle" font-size="13" font-weight="700" fill="#b9dcff">G4</text>
  <text x="140" y="402" font-size="14" font-weight="600" fill="#b9dcff">측위</text>
  <text x="140" y="421" font-size="11" fill="#8c98a4">AMCL pose에서 맵 raycast vs /scan (평균 오차 &lt; 4cm)</text>
  <g stroke="#3a4654" stroke-width="1.6" fill="none"><path d="M310 432 V 452" marker-end="url(#pg)"/></g>

  <!-- G5 -->
  <rect x="60" y="454" width="500" height="52" rx="8" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <rect x="72" y="468" width="52" height="24" rx="5" fill="rgba(240,163,107,0.18)"/>
  <text x="98" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#f3c79b">G5</text>
  <text x="140" y="476" font-size="14" font-weight="600" fill="#f3c79b">회전 품질</text>
  <text x="140" y="495" font-size="11" fill="#8c98a4">제자리 회전 시 AMCL 병진 (odom 병진 ≈ 0이 유효 조건)</text>

  <!-- side note: contamination direction -->
  <g stroke="#3a4654" stroke-width="1.3" fill="none" stroke-dasharray="4 4">
    <path d="M585 184 V 480"/>
  </g>
  <text x="600" y="300" font-size="11" fill="#6272a4" transform="rotate(90 600 300)" text-anchor="middle">앞이 틀리면 뒤 판단이 전부 오염된다</text>
</svg>
