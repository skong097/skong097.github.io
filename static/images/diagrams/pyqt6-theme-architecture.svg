<svg width="600" height="340" viewBox="0 0 600 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PyQt6 3-Layer Theme System Architecture">
  <!-- Dark Round Card Background -->
  <rect width="600" height="340" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  
  <!-- Title Bar -->
  <rect width="600" height="46" rx="14" fill="#0c1117"/>
  <circle cx="20" cy="23" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="23" r="6" fill="#febc2e"/>
  <circle cx="60" cy="23" r="6" fill="#28c840"/>
  <text x="580" y="27" text-anchor="end" fill="#5d6b78" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="12">Architecture — Theme System</text>

  <!-- Central Controller (Logic) -->
  <rect x="220" y="80" width="160" height="60" rx="8" fill="#5ef2b8" fill-opacity="0.1" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="300" y="110" text-anchor="middle" fill="#5ef2b8" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold">Theme Controller</text>
  <text x="300" y="125" text-anchor="middle" fill="#5ef2b8" font-family="'JetBrains Mono', monospace" font-size="10">(_toggle_theme)</text>

  <!-- Layer 1: QSS -->
  <rect x="50" y="200" width="140" height="80" rx="8" fill="#6cb6ff" fill-opacity="0.1" stroke="#6cb6ff" stroke-width="1.5"/>
  <text x="120" y="235" text-anchor="middle" fill="#6cb6ff" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold">Layer 1: QSS</text>
  <text x="120" y="255" text-anchor="middle" fill="#8c98a4" font-family="'JetBrains Mono', monospace" font-size="10">Standard Widgets</text>

  <!-- Layer 2: paintEvent -->
  <rect x="230" y="200" width="140" height="80" rx="8" fill="#f0a36b" fill-opacity="0.1" stroke="#f0a36b" stroke-width="1.5"/>
  <text x="300" y="235" text-anchor="middle" fill="#f0a36b" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold">Layer 2: Paint</text>
  <text x="300" y="255" text-anchor="middle" fill="#8c98a4" font-family="'JetBrains Mono', monospace" font-size="10">Custom Panels</text>

  <!-- Layer 3: pyqtgraph -->
  <rect x="410" y="200" width="140" height="80" rx="8" fill="#b9a7e6" fill-opacity="0.1" stroke="#b9a7e6" stroke-width="1.5"/>
  <text x="480" y="235" text-anchor="middle" fill="#b9a7e6" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold">Layer 3: Plot</text>
  <text x="480" y="255" text-anchor="middle" fill="#8c98a4" font-family="'JetBrains Mono', monospace" font-size="10">Sensor Charts</text>

  <!-- Connectors (Paths) -->
  <path d="M300 140 V170 H120 V200" stroke="#3a4654" stroke-width="2" fill="none"/>
  <path d="M300 170 V200" stroke="#3a4654" stroke-width="2" fill="none"/>
  <path d="M300 170 H480 V200" stroke="#3a4654" stroke-width="2" fill="none"/>
  
  <!-- Arrows -->
  <path d="M120 200 L115 190 H125 L120 200Z" fill="#3a4654"/>
  <path d="M300 200 L295 190 H305 L300 200Z" fill="#3a4654"/>
  <path d="M480 200 L475 190 H485 L480 200Z" fill="#3a4654"/>
  
  <!-- Labels -->
  <rect x="180" y="160" width="60" height="20" rx="4" fill="#0c1117"/>
  <text x="210" y="174" text-anchor="middle" fill="#6272a4" font-family="'JetBrains Mono', monospace" font-size="9">Broadcast</text>
</svg>
