  <text x="595" y="151" text-anchor="middle" font-size="10" fill="#8c98a4">라이다 충돌 회피</text>
  <path d="M660 136 H 690" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

