<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 248" width="760" height="248" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="cmd_vel 파이프라인: 조이스틱(우선순위 100)·Nav2 자율(80)·추종(50) 세 속도 소스가 twist_mux로 모여 우선순위가 중재되고, velocity_smoother가 급가감속을 완화한 뒤, collision_monitor가 라이다로 충돌을 회피해 최종 속도 명령이 바퀴로 전달된다">
  <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L6 3 L0 6 z" fill="#3a4654"/></marker></defs>
  <rect x="1" y="1" width="758" height="246" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="758" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>
  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="738" y="28" text-anchor="end" font-size="12" fill="#5d6b78">flow — cmd_vel 파이프라인</text>

  <!-- sources -->
  <g>
    <rect x="22" y="70" width="150" height="36" rx="7" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.2"/>
    <text x="97" y="93" text-anchor="middle" font-size="11.5" fill="#b9dcff">조이스틱 (100)</text>
    <rect x="22" y="118" width="150" height="36" rx="7" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.2"/>
    <text x="97" y="141" text-anchor="middle" font-size="11.5" fill="#b9dcff">Nav2 / 자율 (80)</text>
    <rect x="22" y="166" width="150" height="36" rx="7" fill="rgba(108,182,255,0.09)" stroke="#6cb6ff" stroke-width="1.2"/>
    <text x="97" y="189" text-anchor="middle" font-size="11.5" fill="#b9dcff">추종 (50)</text>
  </g>
  <path d="M172 88 H 196 V 136 L 214 136" stroke="#3a4654" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <path d="M172 136 H 214" stroke="#3a4654" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <path d="M172 184 H 196 V 136 L 214 136" stroke="#3a4654" stroke-width="1.4" fill="none"/>

