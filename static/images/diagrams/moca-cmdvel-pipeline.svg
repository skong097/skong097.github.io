  <text x="276" y="151" text-anchor="middle" font-size="10" fill="#8c98a4">우선순위 중재</text>
  <path d="M336 136 H 366" stroke="#3a4654" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- smoother -->
  <rect x="368" y="110" width="130" height="52" rx="9" fill="rgba(185,167,230,0.08)" stroke="#b9a7e6" stroke-width="1.4"/>
