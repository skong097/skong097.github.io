<svg width="600" height="380" viewBox="0 0 600 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AIQ Monitor Knowledge Pipeline Architecture">
  <!-- Dark Round Card Background -->
  <rect width="600" height="380" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  
  <!-- Title Bar -->
  <rect width="600" height="46" rx="14" fill="#0c1117"/>
  <circle cx="20" cy="23" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="23" r="6" fill="#febc2e"/>
  <circle cx="60" cy="23" r="6" fill="#28c840"/>
  <text x="580" y="27" text-anchor="end" fill="#5d6b78" font-family="'JetBrains Mono', monospace" font-size="12">Pipeline — Knowledge Cycle</text>

  <!-- Sources -->
  <rect x="40" y="80" width="130" height="40" rx="6" fill="#6cb6ff" fill-opacity="0.1" stroke="#6cb6ff"/>
  <text x="105" y="105" text-anchor="middle" fill="#6cb6ff" font-family="'JetBrains Mono', monospace" font-size="12">KB Radar (Ext)</text>
  
  <rect x="40" y="130" width="130" height="40" rx="6" fill="#6cb6ff" fill-opacity="0.1" stroke="#6cb6ff"/>
  <text x="105" y="155" text-anchor="middle" fill="#6cb6ff" font-family="'JetBrains Mono', monospace" font-size="12">Posts/Proj (Int)</text>

  <!-- Core: nextbrain -->
  <rect x="230" y="95" width="140" height="60" rx="8" fill="#5ef2b8" fill-opacity="0.1" stroke="#5ef2b8" stroke-width="1.5"/>
  <text x="300" y="125" text-anchor="middle" fill="#5ef2b8" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold">nextbrain</text>
  <text x="300" y="140" text-anchor="middle" fill="#5ef2b8" font-family="'JetBrains Mono', monospace" font-size="10">(LLM Wiki)</text>

  <!-- Structure: graphify -->
  <rect x="430" y="95" width="130" height="60" rx="8" fill="#b9a7e6" fill-opacity="0.1" stroke="#b9a7e6" stroke-width="1.5"/>
  <text x="495" y="125" text-anchor="middle" fill="#b9a7e6" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold">graphify</text>
  <text x="495" y="140" text-anchor="middle" fill="#b9a7e6" font-family="'JetBrains Mono', monospace" font-size="10">(Knowledge Graph)</text>

  <!-- Measure: AIQ Monitor -->
  <rect x="330" y="220" width="140" height="60" rx="8" fill="#f0a36b" fill-opacity="0.1" stroke="#f0a36b" stroke-width="1.5"/>
  <text x="400" y="250" text-anchor="middle" fill="#f0a36b" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold">AIQ Monitor</text>
  <text x="400" y="265" text-anchor="middle" fill="#f0a36b" font-family="'JetBrains Mono', monospace" font-size="10">(Readout)</text>

  <!-- Connectors -->
  <path d="M170 100 H230" stroke="#3a4654" stroke-width="2"/>
  <path d="M170 150 H230" stroke="#3a4654" stroke-width="2"/>
  <path d="M370 125 H430" stroke="#3a4654" stroke-width="2"/>
  <path d="M495 155 V220" stroke="#3a4654" stroke-width="2"/>
  <path d="M330 250 H200 V125 H230" stroke="#5ef2b8" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Arrows -->
  <path d="M230 100 L220 95 V105 L230 100Z" fill="#3a4654"/>
  <path d="M230 150 L220 145 V155 L230 150Z" fill="#3a4654"/>
  <path d="M430 125 L420 120 V130 L430 125Z" fill="#3a4654"/>
  <path d="M495 220 L490 210 H500 L495 220Z" fill="#3a4654"/>
  <path d="M230 125 L220 120 V130 L230 125Z" fill="#5ef2b8"/>
  
  <!-- Loop Text -->
  <rect x="80" y="200" width="180" height="26" rx="4" fill="#0c1117"/>
  <text x="170" y="218" text-anchor="middle" fill="#5ef2b8" font-family="'JetBrains Mono', monospace" font-size="11">Feedback: Improve Knowledge</text>
</svg>
