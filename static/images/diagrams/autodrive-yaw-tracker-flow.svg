<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" role="img" aria-label="AMCL yaw 오차 추적 흐름: odom 25% 오차 가설을 실측으로 약 1퍼센트로 반박하고, yaw 약점의 진범이 맵의 180도 대칭임을 진단해, 비대칭 특징을 추가 재매핑하여 위치 오차를 58퍼센트 줄였으며, 보너스로 죽어있던 IMU를 0에서 100Hz로 부활시켰다">
  <rect x="1" y="1" width="878" height="358" rx="14" fill="#0c1117" stroke="rgba(94,242,184,0.16)"/>
  <rect x="1" y="1" width="878" height="46" rx="14" fill="rgba(255,255,255,0.02)"/>

  <circle cx="26" cy="24" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5.5" fill="#febc2e"/>
  <circle cx="62" cy="24" r="5.5" fill="#28c840"/>
  <text x="858" y="28" text-anchor="end" font-size="12" fill="#5d6b78">tracker — AMCL yaw 오차</text>

  <defs>
    <marker id="ay" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3a4654"/>
    </marker>
  </defs>

  <!-- spine -->
  <g stroke="#3a4654" stroke-width="1.8" fill="none">
    <path d="M150 120 H 250" marker-end="url(#ay)"/>
    <path d="M390 120 H 490" marker-end="url(#ay)"/>
    <path d="M630 120 H 730" marker-end="url(#ay)"/>
  </g>

  <!-- step 1 : hypothesis -->
  <rect x="30" y="90" width="120" height="60" rx="9" fill="rgba(255,95,87,0.08)" stroke="#ff7b72" stroke-width="1.3"/>
  <text x="90" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#ffb3ad">가설</text>
  <text x="90" y="134" text-anchor="middle" font-size="11.5" fill="#8c98a4">odom 25% 과소</text>

  <!-- step 2 : refute -->
  <rect x="250" y="90" width="140" height="60" rx="9" fill="rgba(94,242,184,0.10)" stroke="#5ef2b8" stroke-width="1.3"/>
  <text x="320" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#b6f2d8">실측 반박</text>
  <text x="320" y="134" text-anchor="middle" font-size="11.5" fill="#8c98a4">편차 ~1% · odom 정상</text>

  <!-- step 3 : diagnose -->
  <rect x="490" y="90" width="140" height="60" rx="9" fill="rgba(240,163,107,0.09)" stroke="#f0a36b" stroke-width="1.3"/>
  <text x="560" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#f3c79b">진범 진단</text>
  <text x="560" y="134" text-anchor="middle" font-size="11.5" fill="#8c98a4">맵 180° 대칭</text>

  <!-- step 4 : fix -->
  <rect x="730" y="90" width="120" height="60" rx="9" fill="rgba(108,182,255,0.10)" stroke="#6cb6ff" stroke-width="1.3"/>
  <text x="790" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#b9dcff">환경 개선</text>
  <text x="790" y="134" text-anchor="middle" font-size="11.5" fill="#8c98a4">비대칭 특징 추가</text>

  <!-- results panel -->
  <rect x="30" y="190" width="500" height="140" rx="10" fill="rgba(255,255,255,0.02)" stroke="#3a4654" stroke-width="1"/>
  <text x="50" y="216" font-size="13" font-weight="700" fill="#e6edf3">결과 — 대칭 맵 → 비대칭 맵</text>
  <g font-size="13">
    <text x="50" y="248" fill="#8c98a4">위치 x_std (정착)</text>
    <text x="300" y="248" fill="#c9d1d9">0.207 m</text>
    <text x="375" y="248" fill="#5d6b78">→</text>
    <text x="400" y="248" fill="#5ef2b8" font-weight="700">0.086 m</text>
    <text x="490" y="248" fill="#5ef2b8" font-weight="700">−58%</text>

    <text x="50" y="278" fill="#8c98a4">위치 y_std (최선)</text>
    <text x="300" y="278" fill="#c9d1d9">0.100 m</text>
    <text x="375" y="278" fill="#5d6b78">→</text>
    <text x="400" y="278" fill="#5ef2b8" font-weight="700">0.057 m</text>
    <text x="490" y="278" fill="#5ef2b8" font-weight="700">−43%</text>

    <text x="50" y="308" fill="#8c98a4">yaw_std (정착)</text>
    <text x="300" y="308" fill="#c9d1d9">18.3°</text>
    <text x="375" y="308" fill="#5d6b78">→</text>
    <text x="400" y="308" fill="#f0a36b" font-weight="700">13.0°</text>
    <text x="490" y="308" fill="#f0a36b" font-weight="700">−29%</text>
  </g>

  <!-- bonus panel -->
  <rect x="560" y="190" width="290" height="140" rx="10" fill="rgba(94,242,184,0.05)" stroke="rgba(94,242,184,0.3)" stroke-width="1"/>
  <text x="580" y="216" font-size="13" font-weight="700" fill="#b6f2d8">보너스 — 죽은 IMU 부활</text>
  <text x="580" y="246" font-size="12" fill="#8c98a4">진단: I2C clock-stretching</text>
  <text x="580" y="268" font-size="12" fill="#8c98a4">→ 포크 + 재시도/마스킹</text>
  <text x="580" y="300" font-size="14" fill="#c9d1d9">/imu_raw</text>
  <text x="690" y="300" font-size="14" fill="#ff7b72" font-weight="700">0 Hz</text>
  <text x="740" y="300" font-size="14" fill="#5d6b78">→</text>
  <text x="765" y="300" font-size="14" fill="#5ef2b8" font-weight="700">100 Hz</text>
</svg>
