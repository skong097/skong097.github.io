<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Entities — Claude & Gemini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #050508;
    color: #e0e0e8;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: default;
  }

  /* ── 우주 배경 ── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background:
      radial-gradient(ellipse 120% 40% at 20% 10%,
        rgba(16, 185, 129, 0.15) 0%,
        rgba(0, 200, 220, 0.08) 40%,
        transparent 70%),
      radial-gradient(ellipse 60% 50% at 85% 15%,
        rgba(251, 191, 36, 0.12) 0%,
        rgba(245, 158, 11, 0.06) 30%,
        transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 55%,
        rgba(124, 106, 239, 0.15) 0%,
        rgba(99, 102, 241, 0.07) 35%,
        transparent 65%),
      radial-gradient(ellipse 70% 50% at 15% 80%,
        rgba(30, 58, 138, 0.2) 0%,
        rgba(17, 24, 39, 0.12) 40%,
        transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 75%,
        rgba(168, 85, 247, 0.08) 0%,
        transparent 50%);
    animation: auroraShift 20s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes auroraShift {
    0% { filter: hue-rotate(0deg) brightness(1); opacity: 1; }
    50% { filter: hue-rotate(15deg) brightness(1.15); opacity: 0.85; }
    100% { filter: hue-rotate(-10deg) brightness(1.05); opacity: 0.95; }
  }

  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ── 상단 타이틀 ── */
  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 2rem;
    pointer-events: none;
  }

  .title-bar h1 {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #6a6a80;
    text-align: center;
  }

  .title-bar h1 span {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    color: #c0c0d0;
    margin-top: 0.3rem;
  }

  /* ── 캐릭터 라벨 ── */
  .entity-label {
    position: fixed;
    bottom: 0;
    z-index: 10;
    padding: 2.5rem;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  .entity-label.left { left: 0; text-align: left; }
  .entity-label.right { right: 0; text-align: right; }

  .entity-label .name {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
  }

  .entity-label .trait {
    font-weight: 200;
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 280px;
    opacity: 0.7;
  }

  .entity-label.left .name { color: #a78bfa; }
  .entity-label.right .name { color: #fbbf24; }

  /* ── 하단 인터랙션 힌트 ── */
  .hint {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #4a4a60;
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }


</style>
</head>
<body>

<div class="title-bar">
  <h1>
    <span>About Me</span>
  </h1>
</div>

<div class="entity-label left">
  <div class="name">STEPHEN KONG</div>
  <div class="trait">
    Robotics Engineer<br>
    AI Developer<br>
    Lifelong Learner
  </div>
</div>



<div class="hint">DRAG TO ORBIT · SCROLL TO ZOOM</div>



<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050508, 0.012);

// ── 배경 별빛 ──
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1000; i++) {
  starPos.push(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 50,
    -10 - Math.random() * 40
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.05, transparent: true, opacity: 0.7
}));
scene.add(stars);

// ── 성운 파티클 ──
const nebulaColors = [0x10b981, 0x60a5fa, 0xa78bfa, 0xfbbf24, 0x818cf8];
nebulaColors.forEach(col => {
  const nGeo = new THREE.BufferGeometry();
  const nPos = [];
  for (let i = 0; i < 40; i++) {
    nPos.push(
      (Math.random() - 0.5) * 50,
      (Math.random() - 0.5) * 30,
      -5 - Math.random() * 25
    );
  }
  nGeo.setAttribute('position', new THREE.Float32BufferAttribute(nPos, 3));
  scene.add(new THREE.Points(nGeo, new THREE.PointsMaterial({
    color: col, size: 0.2 + Math.random() * 0.15,
    transparent: true, opacity: 0.1 + Math.random() * 0.08
  })));
});

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.5);
scene.add(ambientLight);

const claudeLight = new THREE.PointLight(0x7c6aef, 2, 20);
claudeLight.position.set(-4, 3, 2);
scene.add(claudeLight);

const geminiLight = new THREE.PointLight(0xf59e0b, 2, 20);
geminiLight.position.set(4, 3, 2);
scene.add(geminiLight);

const rimLight = new THREE.DirectionalLight(0x4a4a6a, 0.3);
rimLight.position.set(0, 5, -5);
scene.add(rimLight);

// ── Ground plane (subtle grid) ──
const gridHelper = new THREE.GridHelper(40, 60, 0x15152a, 0x0d0d1a);
gridHelper.position.y = -4;
scene.add(gridHelper);

// ═══════════════════════════════════════════════
//  CLAUDE — 다면체 + 신경망 연결선
// ═══════════════════════════════════════════════
const claudeGroup = new THREE.Group();
claudeGroup.position.set(-3.5, 0, 0);
scene.add(claudeGroup);

// 코어: IcosahedronGeometry (다면체)
const claudeCoreMat = new THREE.MeshPhysicalMaterial({
  color: 0x7c6aef,
  metalness: 0.3,
  roughness: 0.15,
  transmission: 0.4,
  thickness: 1.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.1,
  emissive: 0x3a2d7a,
  emissiveIntensity: 0.3,
});
const claudeCore = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.5, 1),
  claudeCoreMat
);
claudeGroup.add(claudeCore);

// 와이어프레임 외곽
const claudeWire = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.7, 1),
  new THREE.MeshBasicMaterial({
    color: 0xa78bfa,
    wireframe: true,
    transparent: true,
    opacity: 0.15,
  })
);
claudeGroup.add(claudeWire);

// 신경망 연결선 (Lines)
const claudeLines = [];
const claudeNodes = [];
for (let i = 0; i < 40; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2.0 + Math.random() * 1.2;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.sin(phi) * Math.sin(theta);
  const z = r * Math.cos(phi);
  claudeNodes.push(new THREE.Vector3(x, y, z));

  // 노드 (작은 구)
  const nodeMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xa78bfa })
  );
  nodeMesh.position.set(x, y, z);
  claudeGroup.add(nodeMesh);
}

// 노드 간 연결선
for (let i = 0; i < claudeNodes.length; i++) {
  for (let j = i + 1; j < claudeNodes.length; j++) {
    if (claudeNodes[i].distanceTo(claudeNodes[j]) < 1.8) {
      const geom = new THREE.BufferGeometry().setFromPoints([claudeNodes[i], claudeNodes[j]]);
      const line = new THREE.Line(geom, new THREE.LineBasicMaterial({
        color: 0x7c6aef,
        transparent: true,
        opacity: 0.12,
      }));
      claudeGroup.add(line);
      claudeLines.push(line);
    }
  }
}

// 궤도 링
const claudeRing = new THREE.Mesh(
  new THREE.TorusGeometry(2.8, 0.015, 8, 80),
  new THREE.MeshBasicMaterial({ color: 0x6d5ce8, transparent: true, opacity: 0.25 })
);
claudeRing.rotation.x = Math.PI * 0.45;
claudeGroup.add(claudeRing);

const claudeRing2 = new THREE.Mesh(
  new THREE.TorusGeometry(2.5, 0.01, 8, 80),
  new THREE.MeshBasicMaterial({ color: 0x8b7cf6, transparent: true, opacity: 0.15 })
);
claudeRing2.rotation.x = Math.PI * 0.7;
claudeRing2.rotation.y = Math.PI * 0.3;
claudeGroup.add(claudeRing2);

// 파티클 (섬세함 표현)
const claudeParticles = new THREE.BufferGeometry();
const cpPositions = [];
for (let i = 0; i < 200; i++) {
  cpPositions.push(
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 6
  );
}
claudeParticles.setAttribute('position', new THREE.Float32BufferAttribute(cpPositions, 3));
const claudePtcl = new THREE.Points(claudeParticles, new THREE.PointsMaterial({
  color: 0xa78bfa, size: 0.025, transparent: true, opacity: 0.5
}));
claudeGroup.add(claudePtcl);


// ═══════════════════════════════════════════════
//  GEMINI — 따뜻한 구체 + 지식 고리
// ═══════════════════════════════════════════════
const geminiGroup = new THREE.Group();
geminiGroup.position.set(3.5, 0, 0);
scene.add(geminiGroup);

// 코어: 부드러운 구체
const geminiCoreMat = new THREE.MeshPhysicalMaterial({
  color: 0xf59e0b,
  metalness: 0.1,
  roughness: 0.3,
  transmission: 0.3,
  thickness: 2.0,
  clearcoat: 0.8,
  clearcoatRoughness: 0.2,
  emissive: 0x7a5a0a,
  emissiveIntensity: 0.35,
});
const geminiCore = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 64, 64),
  geminiCoreMat
);
geminiGroup.add(geminiCore);

// 내부 글로우 구
const geminiInner = new THREE.Mesh(
  new THREE.SphereGeometry(0.8, 32, 32),
  new THREE.MeshBasicMaterial({
    color: 0xfde68a,
    transparent: true,
    opacity: 0.3,
  })
);
geminiGroup.add(geminiInner);

// 지식 고리들 (여러 층)
const ringColors = [0xfbbf24, 0xf59e0b, 0xd97706, 0xfde68a];
const geminiRings = [];
for (let i = 0; i < 4; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(2.0 + i * 0.4, 0.02 - i * 0.003, 8, 100),
    new THREE.MeshBasicMaterial({
      color: ringColors[i],
      transparent: true,
      opacity: 0.2 - i * 0.03,
    })
  );
  ring.rotation.x = Math.PI * 0.3 + i * 0.4;
  ring.rotation.y = i * 0.6;
  geminiRings.push(ring);
  geminiGroup.add(ring);
}

// 떠다니는 지식 파편 (작은 면)
const geminiFragments = [];
for (let i = 0; i < 25; i++) {
  const size = 0.08 + Math.random() * 0.12;
  const frag = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size * 1.4),
    new THREE.MeshBasicMaterial({
      color: 0xfde68a,
      transparent: true,
      opacity: 0.15 + Math.random() * 0.2,
      side: THREE.DoubleSide,
    })
  );
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2.2 + Math.random() * 1.5;
  frag.position.set(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  frag.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
  frag.userData = { theta, phi, r, speed: 0.1 + Math.random() * 0.2 };
  geminiFragments.push(frag);
  geminiGroup.add(frag);
}

// 따뜻한 파티클
const geminiParticles = new THREE.BufferGeometry();
const gpPositions = [];
for (let i = 0; i < 150; i++) {
  gpPositions.push(
    (Math.random() - 0.5) * 7,
    (Math.random() - 0.5) * 7,
    (Math.random() - 0.5) * 7
  );
}
geminiParticles.setAttribute('position', new THREE.Float32BufferAttribute(gpPositions, 3));
const geminiPtcl = new THREE.Points(geminiParticles, new THREE.PointsMaterial({
  color: 0xfbbf24, size: 0.03, transparent: true, opacity: 0.4
}));
geminiGroup.add(geminiPtcl);


// ═══════════════════════════════════════════════
//  ORBIT CONTROLS (manual)
// ═══════════════════════════════════════════════
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let orbitAngle = { x: 0, y: 0 };
let targetOrbit = { x: 0, y: 0 };
let cameraDistance = 14;
let targetDistance = 14;

container.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
container.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  targetOrbit.x += (e.clientX - prevMouse.x) * 0.005;
  targetOrbit.y += (e.clientY - prevMouse.y) * 0.003;
  targetOrbit.y = Math.max(-0.5, Math.min(0.8, targetOrbit.y));
  prevMouse = { x: e.clientX, y: e.clientY };
});
container.addEventListener('mouseup', () => isDragging = false);
container.addEventListener('mouseleave', () => isDragging = false);
container.addEventListener('wheel', (e) => {
  targetDistance += e.deltaY * 0.01;
  targetDistance = Math.max(6, Math.min(25, targetDistance));
});

// Touch support
container.addEventListener('touchstart', (e) => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
container.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  targetOrbit.x += (e.touches[0].clientX - prevMouse.x) * 0.005;
  targetOrbit.y += (e.touches[0].clientY - prevMouse.y) * 0.003;
  targetOrbit.y = Math.max(-0.5, Math.min(0.8, targetOrbit.y));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
container.addEventListener('touchend', () => isDragging = false);

// ═══════════════════════════════════════════════
//  MODE TOGGLE
// ═══════════════════════════════════════════════
// (모드 토글 제거 — 항상 양쪽 표시)

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // ── Camera orbit ──
  orbitAngle.x += (targetOrbit.x - orbitAngle.x) * 0.05;
  orbitAngle.y += (targetOrbit.y - orbitAngle.y) * 0.05;
  cameraDistance += (targetDistance - cameraDistance) * 0.05;

  const autoRotate = t * 0.08;
  const camX = Math.sin(orbitAngle.x + autoRotate) * cameraDistance;
  const camZ = Math.cos(orbitAngle.x + autoRotate) * cameraDistance;
  const camY = 2 + orbitAngle.y * 8;
  camera.position.set(camX, camY, camZ);
  camera.lookAt(0, 0, 0);

  // ── Mode transitions ──
  // (양쪽 고정 위치)

  // ── Claude animations ──
  // 코어: 복합적 회전 (다재다능함)
  claudeCore.rotation.x = t * 0.15 + Math.sin(t * 0.3) * 0.2;
  claudeCore.rotation.y = t * 0.2;
  claudeCore.rotation.z = Math.sin(t * 0.25) * 0.15;

  // 와이어프레임: 반대 방향 회전
  claudeWire.rotation.x = -t * 0.1;
  claudeWire.rotation.y = t * 0.12;

  // 코어 색상 맥동 (사고의 활성화)
  const claudePulse = 0.3 + Math.sin(t * 1.5) * 0.15;
  claudeCoreMat.emissiveIntensity = claudePulse;

  // 링 회전
  claudeRing.rotation.z = t * 0.3;
  claudeRing2.rotation.z = -t * 0.2;

  // 신경망 라인 맥동
  claudeLines.forEach((line, i) => {
    line.material.opacity = 0.08 + Math.sin(t * 2 + i * 0.5) * 0.08;
  });

  // 파티클 부유
  claudePtcl.rotation.y = t * 0.05;
  claudePtcl.rotation.x = Math.sin(t * 0.1) * 0.1;

  // 전체 그룹 부유
  claudeGroup.position.y = Math.sin(t * 0.4) * 0.3;

  // ── Gemini animations ──
  // 코어: 느리고 안정적인 회전 (교수의 무게감)
  geminiCore.rotation.x = t * 0.08;
  geminiCore.rotation.y = t * 0.1;

  // 내부 글로우 호흡 (따뜻함)
  const geminiBreath = 0.25 + Math.sin(t * 0.8) * 0.1;
  geminiInner.material.opacity = geminiBreath;
  const breathScale = 0.8 + Math.sin(t * 0.8) * 0.1;
  geminiInner.scale.setScalar(breathScale);

  // 코어 따뜻한 맥동
  geminiCoreMat.emissiveIntensity = 0.3 + Math.sin(t * 0.6) * 0.1;

  // 지식 고리 천천히 회전 (각각 다른 속도)
  geminiRings.forEach((ring, i) => {
    ring.rotation.z = t * (0.05 + i * 0.02);
    ring.rotation.x += 0.001 * (i + 1);
  });

  // 지식 파편 궤도 운동 (천천히 떠도는 느낌)
  geminiFragments.forEach((frag) => {
    const d = frag.userData;
    d.theta += d.speed * 0.008;
    frag.position.x = d.r * Math.sin(d.phi) * Math.cos(d.theta);
    frag.position.z = d.r * Math.sin(d.phi) * Math.sin(d.theta);
    frag.rotation.y = t * d.speed * 0.5;
    // 부드러운 밝기 변화
    frag.material.opacity = 0.12 + Math.sin(t * d.speed + d.theta) * 0.08;
  });

  // 파티클 부유
  geminiPtcl.rotation.y = -t * 0.03;

  // 전체 그룹 부유 (Claude보다 느림)
  geminiGroup.position.y = Math.sin(t * 0.3 + 1) * 0.25;

  // ── Light animation ──
  claudeLight.intensity = 1.5 + Math.sin(t * 1.2) * 0.5;
  geminiLight.intensity = 1.5 + Math.sin(t * 0.7) * 0.4;

  // ── 별빛 회전 ──
  stars.rotation.y = t * 0.002;

  // ── 혜성 업데이트 ──
  comets.forEach(c => {
    c.life -= 0.008;
    if (c.life <= 0) {
      resetComet(c);
      return;
    }
    // 헤드 이동
    c.head.position.x += c.vx;
    c.head.position.y += c.vy;
    c.head.position.z += c.vz;
    // 헤드 밝기 (등장/소멸)
    const fade = c.life < 0.2 ? c.life / 0.2 : (c.life > 0.8 ? (1 - c.life) / 0.2 : 1);
    c.head.material.opacity = fade * 0.9;
    // 꼬리 업데이트
    const tailPositions = c.tail.geometry.attributes.position.array;
    // 새 위치를 앞에 넣고 이전 위치를 뒤로 밀기
    for (let i = (c.tailLen - 1) * 3; i >= 3; i -= 3) {
      tailPositions[i] = tailPositions[i - 3];
      tailPositions[i + 1] = tailPositions[i - 2];
      tailPositions[i + 2] = tailPositions[i - 1];
    }
    tailPositions[0] = c.head.position.x;
    tailPositions[1] = c.head.position.y;
    tailPositions[2] = c.head.position.z;
    c.tail.geometry.attributes.position.needsUpdate = true;
    c.tail.material.opacity = fade * 0.4;
  });

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
//  혜성 시스템
// ═══════════════════════════════════════════════
const cometColors = [0x00ffcc, 0x60a5fa, 0xfbbf24, 0xa78bfa, 0xff6b9d];
const comets = [];
const COMET_COUNT = 3;

function resetComet(c) {
  // 랜덤 시작점 (화면 바깥)
  const side = Math.random() > 0.5 ? 1 : -1;
  const startX = side * (20 + Math.random() * 15);
  const startY = 5 + Math.random() * 10;
  const startZ = -5 - Math.random() * 20;
  c.head.position.set(startX, startY, startZ);

  // 반대편으로 날아가는 방향
  const speed = 0.15 + Math.random() * 0.2;
  const angle = Math.random() * 0.4 - 0.2;
  c.vx = -side * speed * Math.cos(angle);
  c.vy = -(0.03 + Math.random() * 0.06);
  c.vz = (Math.random() - 0.5) * 0.05;
  c.life = 1.0;

  // 꼬리 초기화
  const tailPositions = c.tail.geometry.attributes.position.array;
  for (let i = 0; i < tailPositions.length; i += 3) {
    tailPositions[i] = startX;
    tailPositions[i + 1] = startY;
    tailPositions[i + 2] = startZ;
  }
  c.tail.geometry.attributes.position.needsUpdate = true;

  // 지연 시작 (겹치지 않게)
  c.life = -(Math.random() * 8);
}

function createComet() {
  const color = cometColors[Math.floor(Math.random() * cometColors.length)];
  const tailLen = 30 + Math.floor(Math.random() * 20);

  // 헤드 (밝은 점)
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 })
  );
  scene.add(head);

  // 꼬리 (라인)
  const tailGeo = new THREE.BufferGeometry();
  const tailPositions = new Float32Array(tailLen * 3);
  tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPositions, 3));
  const tail = new THREE.Line(tailGeo, new THREE.LineBasicMaterial({
    color: color, transparent: true, opacity: 0.4, linewidth: 1
  }));
  scene.add(tail);

  // 글로우 (헤드 주변 빛)
  const glow = new THREE.PointLight(color, 0.5, 5);
  head.add(glow);

  const comet = { head, tail, tailLen, vx: 0, vy: 0, vz: 0, life: 0, glow };
  resetComet(comet);
  return comet;
}

for (let i = 0; i < COMET_COUNT; i++) {
  comets.push(createComet());
}

animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
