baseURL: https://skong097.github.io/
languageCode: ko
title: Stephen's Robotics Lab
theme: PaperMod

googleAnalytics: ""

params:
  env: production
  description: ROS2 · AI/ML · AI Agent · Computer Vision · Robotics 프로젝트 기록
  author: Stephen Kong
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowToc: true
  defaultTheme: dark
  disableThemeToggle: false
  # ── 검색(Fuse.js) 튜닝 ──────────────────────────────
  # ignoreLocation: 긴 본문 어디서든 매치(기본은 앞부분 위주) → recall 대폭↑
  # threshold 0.3: 느슨한 기본 0.4 대비 잡음↓ (오타 허용은 유지)
  # keys: title·tags·categories 가중↑ (인덱스에 tags/categories 추가됨)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.3
    minMatchCharLength: 2
    ignoreLocation: true
    keys:
    - {name: title, weight: 0.5}
    - {name: tags, weight: 0.2}
    - {name: categories, weight: 0.1}
    - {name: summary, weight: 0.1}
    - {name: content, weight: 0.1}
  homeInfoParams:
    Title: Robotics × AI × ROS2
    Content: '자율순찰 로봇, 컴퓨터 비전, 로보틱스 시뮬레이션을 다루는 개발 블로그입니다. ROS2 기반 로봇 시스템, PyQt6 대시보드,
      YOLO/ST-GCN 비전 파이프라인, LLM 통합 등 실전 프로젝트 경험을 공유합니다. AI Agent 기반 자동화 도구 개발과 에이전트
      협업 Flow 구축도 함께 다룹니다. '
  socialIcons:
  - name: github
    url: https://github.com/skong097
  - name: linkedin
    url: https://linkedin.com/in/skong097
  assets:
    favicon: /favicon.ico
  cover:
    image: images/covers/hero-banner.png
    alt: Stephen's Robotics Lab
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
menu:
  main:
  - identifier: home
    name: 홈
    url: /
    weight: 5
  - identifier: projects
    name: 프로젝트
    url: /projects/
    weight: 10
  - identifier: posts
    name: 포스트
    url: /posts/
    weight: 20
  - identifier: kb-radar
    name: KB Radar
    url: /kb-radar/
    weight: 25
  - identifier: categories
    name: 카테고리
    url: /categories/
    weight: 30
  - identifier: tags
    name: 태그
    url: /tags/
    weight: 40
  - identifier: search
    name: 검색
    url: /search/
    weight: 50
  - identifier: about
    name: About me
    url: /about/
    weight: 60
outputs:
  home:
  - HTML
  - RSS
  - JSON
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula
