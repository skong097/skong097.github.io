{{ define "main" }}
{{/* ═══ KB Radar — 키워드 기반 지식 수집 뷰 ═══
     데이터: data/kb_keywords.yaml (그룹) + data/kb_items.json (항목)
     PaperMod 다크/라이트 모드 연동 */}}

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
.kbr-wrap {
  --bg: #f0f2f5; --card: #ffffff; --card-hover: #f8f9fb;
  --border: #e2e6ea; --border-accent: #b0cfe0;
  --text: #1a202c; --text-2: #64748b; --text-muted: #94a3b8;
  --accent: #0891b2; --glow: rgba(8,145,178,0.08);
  --c-paper: #2563eb; --c-article: #059669; --c-video: #dc2626; --c-person: #7c3aed;
  --radius: 10px; --mono: 'JetBrains Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text); font-family: var(--sans);
  min-height: 100vh; margin: -1rem -1rem 0; padding: 0; transition: background .3s, color .3s;
}
[data-theme="dark"] .kbr-wrap {
  --bg: #0a0e17; --card: #111827; --card-hover: #1a2332;
  --border: #1e2d3d; --border-accent: #0e4f6e;
  --text: #e2e8f0; --text-2: #64748b; --text-muted: #475569;
  --accent: #00e5ff; --glow: rgba(0,229,255,0.15);
  --c-paper: #4488ff; --c-article: #00ff88; --c-video: #ff4466; --c-person: #bc8cff;
}
.kbr-wrap .main { max-width: 100%; padding: 0; }
body:has(.kbr-wrap) .post-content { max-width: 100%; }
body:has(.kbr-wrap) footer.footer { display: none; }
body:has(.kbr-wrap) .page-header { display: none; }

.kbr-header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem; position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(20px); transition: background .3s, border-color .3s;
}
.kbr-header-inner { max-width: 1400px; margin: 0 auto; display: flex;
  align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.kbr-header h2 { font-family: var(--mono); font-size: 1.2rem; font-weight: 700;
  color: var(--accent); margin: 0; letter-spacing: -0.5px; }
.kbr-header h2 span { color: var(--text-2); font-weight: 400; }
.kbr-meta { font-family: var(--mono); font-size: 0.72rem; color: var(--text-2); }
.kbr-meta strong { color: var(--text); }

.kbr-filters { max-width: 1400px; margin: 1rem auto 0; display: flex;
  flex-wrap: wrap; gap: 0.75rem; align-items: center; }
.kbr-chip { padding: 0.35rem 0.8rem; font-family: var(--mono); font-size: 0.72rem;
  border: 1px solid var(--border); background: var(--card); color: var(--text-2);
  border-radius: 999px; cursor: pointer; transition: all .2s; user-select: none; }
.kbr-chip.on { color: #fff; background: var(--accent); border-color: var(--accent); }
[data-theme="dark"] .kbr-chip.on { color: #0a0e17; }
.kbr-search { flex: 1; min-width: 160px; padding: 0.4rem 0.8rem; font-family: var(--sans);
  font-size: 0.8rem; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--card); color: var(--text); }

.kbr-main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.kbr-group { margin-bottom: 2rem; }
.kbr-group-title { font-family: var(--mono); font-size: 0.95rem; font-weight: 700;
  color: var(--text); margin: 0 0 0.9rem; padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
.kbr-group-count { font-size: 0.7rem; color: var(--text-muted); font-weight: 400; }
.kbr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

.kbr-card { background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.1rem; display: flex; flex-direction: column;
  transition: border-color .2s, box-shadow .2s, background .3s; }
.kbr-card:hover { border-color: var(--border-accent); box-shadow: 0 0 20px var(--glow); }
.kbr-card.archived { opacity: 0.6; }
.kbr-badge { display: inline-block; align-self: flex-start; padding: 2px 8px;
  border-radius: 4px; font-family: var(--mono); font-size: 0.62rem; font-weight: 600;
  text-transform: uppercase; margin-bottom: 0.5rem; }
.kbr-badge.paper { background: rgba(37,99,235,0.15); background: color-mix(in srgb, var(--c-paper) 15%, transparent); color: var(--c-paper); }
.kbr-badge.article { background: rgba(5,150,105,0.15); background: color-mix(in srgb, var(--c-article) 15%, transparent); color: var(--c-article); }
.kbr-badge.video { background: rgba(220,38,38,0.15); background: color-mix(in srgb, var(--c-video) 15%, transparent); color: var(--c-video); }
.kbr-badge.person { background: rgba(124,58,237,0.15); background: color-mix(in srgb, var(--c-person) 15%, transparent); color: var(--c-person); }
.kbr-card-title { font-weight: 600; font-size: 0.92rem; line-height: 1.4; margin-bottom: 0.5rem; }
.kbr-card-title a { color: var(--text); text-decoration: none; }
.kbr-card-title a:hover { color: var(--accent); text-decoration: underline; }
.kbr-summary { font-size: 0.8rem; color: var(--text-2); line-height: 1.55; flex: 1; margin-bottom: 0.7rem; }
.kbr-card-foot { display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 0.66rem; color: var(--text-muted); gap: 0.5rem; }
.kbr-source { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.kbr-empty { text-align: center; padding: 4rem 1rem; color: var(--text-muted);
  font-family: var(--mono); font-size: 0.85rem; line-height: 1.8; }
.kbr-footer { text-align: center; padding: 2rem; font-size: 0.7rem; color: var(--text-muted);
  border-top: 1px solid var(--border); margin-top: 2rem; font-family: var(--mono); }

@media (max-width: 768px) {
  .kbr-header { padding: 1rem; } .kbr-main { padding: 1rem; }
  .kbr-grid { grid-template-columns: 1fr; }
}
</style>

<div class="kbr-wrap">
  <header class="kbr-header">
    <div class="kbr-header-inner">
      <h2>KB Radar <span>| 지식 레이더</span></h2>
      <div class="kbr-meta">
        Last collected: <strong id="kbrLast">—</strong> &middot;
        Items: <strong id="kbrCount">0</strong>
      </div>
    </div>
    <div class="kbr-filters" id="kbrFilters">
      <span class="kbr-chip on" data-cat="paper">논문</span>
      <span class="kbr-chip on" data-cat="article">기사</span>
      <span class="kbr-chip on" data-cat="video">영상</span>
      <span class="kbr-chip on" data-cat="person">인물</span>
      <span class="kbr-chip" id="kbrArchive" data-archive>아카이브 포함</span>
      <input class="kbr-search" id="kbrSearch" type="search" placeholder="제목·요약·그룹 검색…">
    </div>
  </header>

  <main class="kbr-main" id="kbrMain"></main>

  <footer class="kbr-footer">
    KB Radar &mdash; 키워드 기반 지식 수집 &middot; Stephen Kong &middot; {{ now.Year }}
  </footer>
</div>

<script>
const KB = JSON.parse({{ (site.Data.kb_items) | jsonify }});
const KW = JSON.parse({{ (site.Data.kb_keywords) | jsonify }});
const ITEMS = (KB && KB.items) || [];
const GROUPS = (KW && KW.groups) || [];
const CAT_LABEL = { paper: "논문", article: "기사", video: "영상", person: "인물" };

const state = { cats: new Set(["paper","article","video","person"]), archived: false, q: "" };

document.getElementById("kbrLast").textContent = (KB && KB.last_collected) || "—";

function visible(it) {
  if (!state.cats.has(it.category)) return false;
  if (!state.archived && it.archived) return false;
  if (state.q) {
    const hay = ((it.title||"") + " " + (it.summary||"") + " " + (it.group||"")).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function cardHtml(it) {
  const cat = CAT_LABEL[it.category] ? it.category : "article";
  const date = it.published || it.collected || "";
  const src = it.source || "";
  const title = it.title ? esc(it.title) : "(제목 없음)";
  return `<div class="kbr-card${it.archived ? ' archived' : ''}">
    <span class="kbr-badge ${cat}">${CAT_LABEL[cat] || cat}</span>
    <div class="kbr-card-title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${title}</a></div>
    <div class="kbr-summary">${esc(it.summary)}</div>
    <div class="kbr-card-foot">
      <span class="kbr-source">${esc(src)}${date ? " &middot; " + esc(date) : ""}</span>
      <span>↗</span>
    </div>
  </div>`;
}

function render() {
  const main = document.getElementById("kbrMain");
  const shown = ITEMS.filter(visible);
  document.getElementById("kbrCount").textContent = shown.length;

  if (ITEMS.length === 0) {
    main.innerHTML = `<div class="kbr-empty">아직 수집된 항목이 없습니다.<br>
      <code>scripts/run_kb_radar.sh</code> 를 실행하면 항목이 채워집니다.</div>`;
    return;
  }

  const order = GROUPS.map(g => g.id);
  const nameOf = {}; GROUPS.forEach(g => nameOf[g.id] = g.name);
  const orphans = [...new Set(shown.map(i => i.group).filter(g => !order.includes(g)))];
  const allGroups = order.concat(orphans);

  let html = "";
  allGroups.forEach(gid => {
    const list = shown.filter(i => i.group === gid);
    if (list.length === 0) return;
    list.sort((a,b) => (b.published || b.collected || "").localeCompare(a.published || a.collected || ""));
    html += `<section class="kbr-group">
      <h3 class="kbr-group-title">${esc(nameOf[gid] || gid)}
        <span class="kbr-group-count">${list.length}</span></h3>
      <div class="kbr-grid">${list.map(cardHtml).join("")}</div>
    </section>`;
  });
  main.innerHTML = html || `<div class="kbr-empty">필터 조건에 맞는 항목이 없습니다.</div>`;
}

document.querySelectorAll(".kbr-chip[data-cat]").forEach(chip => {
  chip.addEventListener("click", () => {
    const c = chip.dataset.cat;
    if (state.cats.has(c)) { state.cats.delete(c); chip.classList.remove("on"); }
    else { state.cats.add(c); chip.classList.add("on"); }
    render();
  });
});
const archChip = document.getElementById("kbrArchive");
archChip.addEventListener("click", () => {
  state.archived = !state.archived;
  archChip.classList.toggle("on", state.archived);
  render();
});
document.getElementById("kbrSearch").addEventListener("input", e => {
  state.q = e.target.value.trim().toLowerCase();
  render();
});

render();
</script>
{{ end }}
